<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN QUANG STORE - SHOP ROBUX</title>
    <!-- Firebase SDKs (Bản dễ dùng nhất cho HTML) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #ff4757; --secondary: #2f3542; --gold: #f1c40f; }
        body { font-family: sans-serif; background: #1e272e; color: white; padding: 20px; text-align: center; }
        header { display: flex; justify-content: space-between; align-items: center; background: #2f3542; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-nap { background: var(--gold); color: black; }
        .btn-admin { background: #e67e22; color: white; display: none; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #2f3542; margin: 10% auto; padding: 20px; width: 350px; border-radius: 10px; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        #admin-panel { display: none; background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--primary); margin:0;">TN QUANG STORE</h2>
    <div id="user-area">
        <button class="btn" onclick="openModal('authModal')">Đăng Nhập / Đăng Ký</button>
    </div>
</header>

<div class="shop-content">
    <div style="background:#2f3542; padding: 20px; border-radius: 10px; display: inline-block;">
        <img src="https://img.freepik.com/free-vector/lucky-spin-banner-with-glowing-light-effect_1017-31038.jpg" width="200"><br>
        <h3>Vòng Quay Robux</h3>
        <p>10.000đ / lượt</p>
        <button class="btn btn-nap" onclick="quayRobux()">QUAY NGAY</button>
    </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel">
    <h2 style="color: orange;">⚙️ QUẢN TRỊ VIÊN</h2>
    <h3>Duyệt Thẻ Nạp</h3>
    <table>
        <thead><tr><th>User</th><th>Thẻ</th><th>Mệnh giá</th><th>Duyệt</th></tr></thead>
        <tbody id="list-nap-the"></tbody>
    </table>
    <h3>Thành Viên</h3>
    <table>
        <thead><tr><th>Email</th><th>Tiền</th><th>Hành động</th></tr></thead>
        <tbody id="list-users"></tbody>
    </table>
</div>

<!-- Modal Nạp Thẻ -->
<div id="napTheModal" class="modal">
    <div class="modal-content">
        <h3>🎫 NẠP THẺ CÀO</h3>
        <select id="loaiThe"><option>Viettel</option><option>Zing</option></select>
        <select id="menhGia"><option value="10000">10k</option><option value="20000">20k</option><option value="50000">50k</option></select>
        <input type="text" id="maThe" placeholder="Mã thẻ">
        <input type="text" id="seriThe" placeholder="Số seri">
        <button class="btn btn-nap" onclick="guiDonNapThe()">GỬI THẺ</button>
        <button onclick="closeModal('napTheModal')">Đóng</button>
    </div>
</div>

<!-- Modal Login -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h3>ĐĂNG NHẬP / ĐĂNG KÝ</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn btn-nap" onclick="handleAuth()">XÁC NHẬN</button>
        <button onclick="closeModal('authModal')">Đóng</button>
    </div>
</div>

<script>
// CẤU HÌNH XỊN CỦA ÔNG
const firebaseConfig = {
  apiKey: "AIzaSyBfFejnht7HCJqjw95JFCpOMPR1HB3GSGU",
  authDomain: "tnquangstore.firebaseapp.com",
  projectId: "tnquangstore",
  storageBucket: "tnquangstore.firebasestorage.app",
  messagingSenderId: "683180615667",
  appId: "1:683180615667:web:8baece012df95a0bb35486"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const adminEmail = "tnquang477@gmail.com";

function openModal(id) { document.getElementById(id).style.display='block'; }
function closeModal(id) { document.getElementById(id).style.display='none'; }

// Đăng nhập / Đăng ký
async function handleAuth() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('pass').value;
    try {
        await auth.signInWithEmailAndPassword(e, p);
    } catch(err) {
        try {
            await auth.createUserWithEmailAndPassword(e, p);
            await db.collection("users").doc(e).set({ vnd: 0, robux: 0 });
        } catch(e2) { alert(e2.message); }
    }
    closeModal('authModal');
}

// Theo dõi trạng thái
auth.onAuthStateChanged(user => {
    if(user) {
        db.collection("users").doc(user.email).onSnapshot(doc => {
            const d = doc.data();
            document.getElementById('user-area').innerHTML = `
                <span>💰 ${d.vnd.toLocaleString()}đ | 💎 ${d.robux} R$</span>
                <button class="btn btn-nap" onclick="openModal('napTheModal')">🎫 Nạp Thẻ</button>
                ${user.email === adminEmail ? '<button class="btn btn-admin" style="display:inline" onclick="toggleAdmin()">⚙️ ADMIN</button>' : ''}
                <button onclick="auth.signOut()">Thoát</button>
            `;
        });
        if(user.email === adminEmail) loadAdmin();
    } else {
        document.getElementById('user-area').innerHTML = `<button class="btn" onclick="openModal('authModal')">Đăng Nhập / Đăng Ký</button>`;
    }
});

function toggleAdmin() {
    const p = document.getElementById('admin-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function guiDonNapThe() {
    await db.collection("napthe").add({
        email: auth.currentUser.email,
        loaiThe: document.getElementById('loaiThe').value,
        menhGia: parseInt(document.getElementById('menhGia').value),
        maThe: document.getElementById('maThe').value,
        seriThe: document.getElementById('seriThe').value,
        status: "Chờ duyệt"
    });
    alert("Đã gửi đơn nạp!");
    closeModal('napTheModal');
}

async function quayRobux() {
    const ref = db.collection("users").doc(auth.currentUser.email);
    const d = (await ref.get()).data();
    if(d.vnd < 10000) return alert("Bạn không đủ tiền!");
    const r = [10, 20, 50, 100][Math.floor(Math.random()*4)];
    await ref.update({ vnd: d.vnd - 10000, robux: d.robux + r });
    alert("Bạn nhận được " + r + " Robux!");
}

function loadAdmin() {
    db.collection("napthe").where("status","==","Chờ duyệt").onSnapshot(s => {
        let h = "";
        s.forEach(doc => {
            const d = doc.data();
            h += `<tr><td>${d.email}</td><td>${d.loaiThe}</td><td>${d.menhGia}</td>
            <td><button onclick="duyetThe('${doc.id}','${d.email}',${d.menhGia})">Duyệt</button></td></tr>`;
        });
        document.getElementById('list-nap-the').innerHTML = h;
    });
}

async function duyetThe(id, email, tien) {
    const ref = db.collection("users").doc(email);
    const d = (await ref.get()).data();
    await ref.update({ vnd: d.vnd + tien });
    await db.collection("napthe").doc(id).update({ status: "Thành công" });
    alert("Đã cộng tiền!");
}
</script>
</body>
</html>
