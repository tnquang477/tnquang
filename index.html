<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novahikariastral Profile</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .profile-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            margin: 0 auto;
        }
        h1 { color: #38bdf8; }
        .links a {
            display: block;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .links a:hover { transform: scale(1.05); background: #7dd3fc; }
        .game-tag { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>
    <div class="profile-card">
        <h1>Novahikariastral</h1>
        <p class="game-tag">Game Player | Content Creator</p>
        <p>Chào mừng bạn đến với trang web của tôi!</p>
        
        <div class="links">
            <!-- Thay link của bạn vào đây -->
            <a href="https://www.tiktok.com/" target="_blank">My TikTok</a>
            <a href="https://www.youtube.com/" target="_blank">My YouTube</a>
            <a href="#">My Roblox Profile</a>
        </div>
    </div>
</body>
</html>
