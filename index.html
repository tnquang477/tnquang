<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNQuangStore - Dịch Vụ Roblox & Túi Mù</title>
    <style>
        :root { --main-color: #00a2ff; --pink-lucky: #ff00ff; --bg-dark: #191b1d; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        
        /* Banner Shop */
        #banner { width: 100%; height: 220px; background: var(--bg-dark); background-size: cover; background-position: center; transition: 1s; display: flex; align-items: center; justify-content: center; color: white; text-shadow: 2px 2px 15px rgba(0,0,0,0.8); font-size: 32px; font-weight: 900; }

        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        .section-title { border-left: 5px solid var(--main-color); padding-left: 12px; margin: 25px 0; font-size: 20px; color: var(--bg-dark); font-weight: bold; text-transform: uppercase; }

        /* Grid Sản Phẩm */
        .grid-acc { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .acc-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; text-align: center; padding-bottom: 15px; transition: 0.3s; position: relative; }
        .acc-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .acc-card img { width: 100%; height: 150px; object-fit: cover; }
        
        .badge { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; font-size: 11px; padding: 4px 0; font-weight: bold; }
        .btn-mua { background: var(--main-color); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 85%; }

        /* Popup */
        #popupPayment { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; }
        .popup-content { background:white; width:90%; max-width:360px; padding:25px; border-radius:20px; text-align:center; }
        .input-style { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="banner">TNQUANG STORE</div>

    <div class="container">
        <!-- 1. NHẬN HÀNG TỰ ĐỘNG -->
        <div style="background: #e1f5fe; border: 2px solid var(--main-color); padding: 20px; border-radius: 15px; margin-bottom: 30px; text-align: center;">
            <h3 style="margin-top:0; color: #01579b;">📦 NHẬN HÀNG TỰ ĐỘNG</h3>
            <input type="text" id="inputMaDon" class="input-style" placeholder="Nhập mã đơn hàng từ Admin...">
            <button onclick="layAcc()" style="width:100%; background:#01579b;" class="btn-mua">KIỂM TRA NGAY</button>
            <div id="ketQuaAcc" class="hidden" style="margin-top:15px; padding:15px; background:white; border: 1px solid #4caf50; border-radius:10px; text-align: left;">
                <span id="thongTinChiTiet" style="font-family: monospace;"></span>
            </div>
        </div>

        <!-- 2. TÚI MÙ MAY MẮN -->
        <div class="section-title" style="color: var(--pink-lucky); border-color: var(--pink-lucky);">🎲 Túi Mù Nhân Phẩm</div>
        <div class="grid-acc" style="margin-bottom: 30px;">
            <div class="acc-card" style="border: 2px solid var(--pink-lucky);">
                <div class="badge" style="background: var(--pink-lucky);">CƠ HỘI TRÚNG ACC KITSUNE</div>
                <img src="https://i.ytimg.com/vi/Sndq0xS1mQY/maxresdefault.jpg">
                <h4 style="color: var(--pink-lucky);">Túi Mù Blox Fruit</h4>
                <p><b>20.000đ</b></p>
                <button class="btn-mua" style="background: var(--pink-lucky);" onclick="moThanhToan('20000', 'TÚI MÙ BF')">MỞ NGAY</button>
            </div>
            <div class="acc-card" style="border: 2px solid #ffcc00;">
                <div class="badge" style="background: #ffcc00; color: #333;">100% TRÚNG ROBUX XỊN</div>
                <img src="https://i.ytimg.com/vi/v5j7n6n8p7k/maxresdefault.jpg">
                <h4 style="color: #b8860b;">Túi Mù Robux</h4>
                <p><b>50.000đ</b></p>
                <button class="btn-mua" style="background: #ffcc00; color: #333;" onclick="moThanhToan('50000', 'TÚI MÙ ROBUX')">MỞ NGAY</button>
            </div>
        </div>

        <!-- 3. DỊCH VỤ HOT -->
        <div class="section-title">🔥 Dịch Vụ Hot</div>
        <div class="grid-acc">
            <div class="acc-card">
                <img src="https://wallpapers.com/images/featured/blox-fruits-pictures-7u55p4n509015c7j.jpg">
                <h4>Acc Blox Fruit Rank Cao</h4>
                <p><b>100.000đ</b></p>
                <button class="btn-mua" onclick="moThanhToan('100000', 'ACC BF VIP')">THANH TOÁN</button>
            </div>
            <div class="acc-card">
                <img src="https://trungtamgarena.vn/wp-content/uploads/2023/11/cay-thue-blox-fruit-gia-re.jpg">
                <h4>Cày Thuê Level Siêu Tốc</h4>
                <p><b>30.000đ</b></p>
                <button class="btn-mua" onclick="moThanhToan('30000', 'CÀY THUÊ')">THANH TOÁN</button>
            </div>
        </div>
    </div>

    <!-- POPUP THANH TOÁN -->
    <div id="popupPayment">
        <div class="popup-content">
            <h3 id="txtMaAcc" style="color: var(--main-color);">Thanh toán</h3>
            <div id="step1">
                <button onclick="hienBank()" style="width:100%; padding:12px; margin-bottom:10px; background:#28a745; color:white; border:none; border-radius:8px; font-weight:bold;">🏦 Ngân hàng (QR)</button>
                <button onclick="hienThe()" style="width:100%; padding:12px; background:#f39c12; color:white; border:none; border-radius:8px; font-weight:bold;">💳 Thẻ Cào</button>
                <button onclick="dongPopup()" style="background:none; border:none; color:#666; margin-top:10px;">Đóng</button>
            </div>
            <div id="stepBank" class="hidden">
                <img id="hinhQR" src="" style="width:100%; border-radius:10px;">
                <p style="font-size:12px; color:red;">Quét mã để thanh toán</p>
                <button onclick="quayLai()">Quay lại</button>
            </div>
            <div id="stepThe" class="hidden">
                <select id="loaiThe" class="input-style"><option>Viettel</option><option>Zing</option></select>
                <input type="text" id="maThe" class="input-style" placeholder="Mã thẻ">
                <input type="text" id="seriThe" class="input-style" placeholder="Seri">
                <button onclick="guiThe()" class="btn-mua">GỬI THẺ</button>
                <button onclick="quayLai()" style="display:block; margin:10px auto;">Quay lại</button>
            </div>
        </div>
    </div>

    <script>
        // Cài đặt Webhook và Ngân hàng của bạn
        const MY_WEBHOOK = "DÁN_LINK_DISCORD_VÀO_ĐÂY"; // Link Discord
        const MY_STK = "STK_CỦA_BẠN"; // Số tài khoản
        const MY_BANK = "MB"; // Ngân hàng (MB, VCB, VTB...)
        const MY_NAME = "TEN_CUA_BAN"; // Tên không dấu

        // Banner đổi ảnh
        const images = ['https://i.ytimg.com/vi/Sndq0xS1mQY/maxresdefault.jpg', 'https://trungtamgarena.vn/wp-content/uploads/2023/11/cay-thue-blox-fruit-gia-re.jpg'];
        let idx = 0;
        setInterval(() => {
            document.getElementById('banner').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${images[idx]}')`;
            idx = (idx + 1) % images.length;
        }, 5000);

        let g_gia = ""; let g_ma = "";
        function moThanhToan(gia, ma) {
            g_gia = gia; g_ma = ma;
            document.getElementById('txtMaAcc').innerText = "Thanh toán: " + ma;
            document.getElementById('popupPayment').style.display = 'flex';
            quayLai();
        }

        function hienBank() {
            document.getElementById('hinhQR').src = `https://img.vietqr.io/image/${MY_BANK}-${MY_STK}-compact2.png?amount=${g_gia}&addInfo=TNQ%20${g_ma}&accountName=${MY_NAME}`;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('stepBank').classList.remove('hidden');
        }

        function hienThe() {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('stepThe').classList.remove('hidden');
        }

        function quayLai() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('stepBank').classList.add('hidden');
            document.getElementById('stepThe').classList.add('hidden');
        }

        function dongPopup() { document.getElementById('popupPayment').style.display = 'none'; }

        function guiThe() {
            const loai = document.getElementById('loaiThe').value;
            const ma = document.getElementById('maThe').value;
            const seri = document.getElementById('seriThe').value;
            if(!ma || !seri) return alert("Nhập đủ thông tin!");

            fetch(MY_WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: `🚀 **TNQuangStore - ĐƠN MỚI!**\nSản phẩm: ${g_ma}\nThẻ: ${loai}\nMã: \`${ma}\`\nSeri: \`${seri}\``})
            }).then(() => { alert("Đã gửi! Chờ Admin check và gửi mã nhận hàng nhé."); dongPopup(); });
        }

        // Kho mã nhận hàng (Bạn tự thêm vào đây)
        const KHO_ACC = {
            "LUCKY-888": "Chúc mừng! Bạn trúng Acc Blox Fruit Max Level: user/pass...",
            "TNQ-123": "Gói Robux của bạn đang được nạp, vui lòng chờ 5p!"
        };

        function layAcc() {
            const m = document.getElementById('inputMaDon').value.trim();
            if(KHO_ACC[m]) {
                document.getElementById('thongTinChiTiet').innerText = KHO_ACC[m];
                document.getElementById('ketQuaAcc').classList.remove('hidden');
            } else { alert("Mã không đúng!"); }
        }
    </script>
</body>
</html>
